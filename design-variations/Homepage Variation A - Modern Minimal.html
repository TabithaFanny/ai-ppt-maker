<!--
  Design Variation A: Modern Minimal
  Style: Ultra-clean, generous whitespace, soft colors, minimal visual noise
  Target: Professionals who value clarity and focus

  Design Decisions:
  - Monochromatic palette with single accent
  - Heavy use of whitespace (40% of viewport)
  - Single focal CTA
  - Subtle motion on scroll
  - Card-less layout with section breaks
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI PPT 生成平台 - Modern Minimal</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: oklch(98% 0 0);
      --text-primary: oklch(20% 0 0);
      --text-secondary: oklch(50% 0 0);
      --accent: oklch(55% 0.15 250);
      --accent-light: oklch(92% 0.03 250);
      --border: oklch(88% 0 0);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 24px 0;
      background: rgba(98%, 98%, 98%, 0.9);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .nav-cta {
      padding: 10px 24px;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 140px 0 80px;
    }

    .hero-eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards;
    }

    .hero-title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 600;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease 0.1s forwards;
    }

    .hero-subtitle {
      font-size: clamp(18px, 2vw, 24px);
      color: var(--text-secondary);
      max-width: 560px;
      margin-bottom: 56px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 36px;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease 0.3s forwards;
      transition: box-shadow 0.3s ease;
    }

    .hero-cta:hover {
      box-shadow: 0 20px 40px -10px rgba(50, 100, 250, 0.3);
    }

    /* Workflow */
    .workflow {
      padding: 120px 0;
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .section-title {
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 600;
      letter-spacing: -1.5px;
      margin-bottom: 80px;
    }

    .workflow-steps {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 32px;
    }

    .workflow-step {
      position: relative;
      padding-top: 48px;
    }

    .workflow-step::before {
      content: '';
      position: absolute;
      top: 16px;
      left: 24px;
      width: 1px;
      height: calc(100% - 32px);
      background: var(--border);
    }

    .workflow-step:last-child::before {
      display: none;
    }

    .step-number {
      position: absolute;
      top: 0;
      left: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .step-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .step-desc {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Features */
    .features {
      padding: 120px 0;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .feature-item {
      padding: 64px 48px;
      background: var(--bg);
      transition: background 0.3s ease;
    }

    .feature-item:hover {
      background: var(--accent-light);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 32px;
      color: var(--accent);
    }

    .feature-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .feature-desc {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* Footer */
    .footer {
      padding: 64px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer-text {
      font-size: 14px;
      color: var(--text-secondary);
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .workflow-steps {
        grid-template-columns: 1fr;
        gap: 48px;
      }

      .workflow-step::before {
        display: none;
      }

      .features-grid {
        grid-template-columns: 1fr;
      }

      .feature-item {
        padding: 48px 24px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      return (
        <>
          <nav className="nav">
            <div className="container nav-inner">
              <div className="logo">AIPPT</div>
              <button className="nav-cta">开始使用</button>
            </div>
          </nav>

          <section className="hero">
            <div className="container">
              <p className="hero-eyebrow">智能 PPT 生成</p>
              <h1 className="hero-title">让创作<br/>更专注</h1>
              <p className="hero-subtitle">
                上传模板，AI 分析风格，输入需求，自动生成专业 PPT。
                全程可编辑，一切尽在掌控。
              </p>
              <a href="/create" className="hero-cta">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
                开始创建
              </a>
            </div>
          </section>

          <section className="workflow">
            <div className="container">
              <p className="section-label">工作流程</p>
              <h2 className="section-title">五步完成 PPT</h2>
              <div className="workflow-steps">
                {[
                  { title: '上传模板', desc: '支持 PDF、PPT、PPTX' },
                  { title: 'AI 分析', desc: '提取设计风格和色彩' },
                  { title: '输入需求', desc: '主题、要点、页数' },
                  { title: '编辑内容', desc: '拖拽排序所见即所得' },
                  { title: '导出分享', desc: 'PPTX 或 JSON' }
                ].map((step, i) => (
                  <div key={i} className="workflow-step">
                    <span className="step-number">{i + 1}</span>
                    <h3 className="step-title">{step.title}</h3>
                    <p className="step-desc">{step.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="features">
            <div className="container">
              <div className="features-grid">
                <div className="feature-item">
                  <svg className="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                  </svg>
                  <h3 className="feature-title">智能模板分析</h3>
                  <p className="feature-desc">AI 自动识别模板的设计 DNA，包括色彩、字体、布局等核心元素。</p>
                </div>
                <div className="feature-item">
                  <svg className="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/>
                  </svg>
                  <h3 className="feature-title">灵活编辑</h3>
                  <p className="feature-desc">大纲树视图配合幻灯片编辑器，拖拽排序，实时预览。</p>
                </div>
                <div className="feature-item">
                  <svg className="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                  </svg>
                  <h3 className="feature-title">实时生成</h3>
                  <p className="feature-desc">SSE 流式推送进度，生成过程一目了然，无需等待。</p>
                </div>
                <div className="feature-item">
                  <svg className="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                  </svg>
                  <h3 className="feature-title">本地优先</h3>
                  <p className="feature-desc">数据存储在本地 IndexedDB，离线可用，无需注册。</p>
                </div>
              </div>
            </div>
          </section>

          <footer className="footer">
            <div className="container">
              <p className="footer-text">AI PPT 生成平台 · 让创作更专注</p>
            </div>
          </footer>
        </>
      );
    }

    window.App = App;
  </script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
