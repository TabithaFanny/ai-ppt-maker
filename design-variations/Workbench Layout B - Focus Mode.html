<!--
  AI PPT 工作台 B - 聚焦模式
  Style: Dark mode, focus on preview, floating panels
  Target: Focus on content creation

  Layout:
  - Left: Collapsible panels (Template + Style)
  - Center: Large Preview (dominant)
  - Right: Floating Outline + Content Editor
  - Bottom: Floating Prompt Bar
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI PPT 工作台 - 聚焦模式</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: oklch(10% 0 0);
      --surface: oklch(14% 0 0);
      --surface-raised: oklch(18% 0.01 0);
      --border: oklch(25% 0 0);
      --text: oklch(97% 0 0);
      --text-secondary: oklch(65% 0 0);
      --text-muted: oklch(45% 0 0);
      --accent: oklch(70% 0.18 250);
      --accent-dim: oklch(70% 0.12 250);
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 48px 1fr 64px;
      height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 5px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .breadcrumb-sep {
      color: var(--text-muted);
    }

    .breadcrumb-current {
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface-raised);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }

    .btn:hover {
      color: var(--text);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }

    /* Main Area */
    .main {
      display: grid;
      grid-template-columns: 240px 1fr 320px;
      overflow: hidden;
    }

    /* Left Panel */
    .panel-left {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section:last-child {
      border-bottom: none;
      flex: 1;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .template-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .template-item {
      aspect-ratio: 16/9;
      background: var(--surface-raised);
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .template-item.selected {
      border-color: var(--accent);
    }

    .template-item-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 4px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      font-size: 10px;
    }

    .template-check {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .template-item.selected .template-check {
      display: flex;
    }

    .style-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .style-item:last-child {
      border-bottom: none;
    }

    .style-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .style-value {
      font-size: 12px;
    }

    .color-row {
      display: flex;
      gap: 4px;
    }

    .color-dot {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Center Preview */
    .preview-area {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    .slide-preview {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      padding: 48px;
      display: flex;
      flex-direction: column;
    }

    .slide-title {
      font-size: 32px;
      font-weight: 700;
      color: #111;
      margin-bottom: 24px;
    }

    .slide-content {
      font-size: 16px;
      color: #333;
      line-height: 1.8;
      flex: 1;
    }

    .slide-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }

    .slide-meta {
      font-size: 12px;
      color: #666;
    }

    .preview-controls {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
    }

    .preview-nav {
      width: 32px;
      height: 32px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .preview-nav:hover {
      color: var(--text);
    }

    .preview-counter {
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 60px;
      text-align: center;
    }

    /* Right Panel */
    .panel-right {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .panel-tab {
      flex: 1;
      padding: 12px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .panel-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .outline-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .outline-item:hover {
      background: var(--surface-raised);
    }

    .outline-item.active {
      background: var(--accent-dim);
    }

    .outline-num {
      width: 22px;
      height: 22px;
      background: var(--surface-raised);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .outline-item.active .outline-num {
      background: var(--accent);
      color: white;
    }

    .outline-text {
      flex: 1;
      min-width: 0;
    }

    .outline-title {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .outline-sub {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Bottom Bar */
    .bottom-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    .prompt-trigger {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
    }

    .prompt-input-area {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
    }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text);
      padding: 12px 0;
    }

    .prompt-input::placeholder {
      color: var(--text-muted);
    }

    .prompt-send {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
    }

    /* Floating Prompt Panel */
    .prompt-float {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
      display: none;
    }

    .prompt-float.open {
      display: block;
    }

    .prompt-float-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .prompt-field {
      margin-bottom: 12px;
    }

    .prompt-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }

    .prompt-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      color: var(--text);
      resize: none;
    }

    .prompt-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .prompt-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      const [selected, setSelected] = React.useState(0);
      const [promptOpen, setPromptOpen] = React.useState(false);

      const templates = [
        { name: '商务蓝调', color: '#1e3a5f' },
        { name: '创意渐变', color: '#667eea' },
        { name: '简约灰白', color: '#6b7280' },
      ];

      const slides = [
        { title: '市场分析报告', sub: '2024年度行业趋势' },
        { title: '核心发现', sub: '市场增长率达23%' },
        { title: '竞争格局', sub: '头部企业份额' },
      ];

      return (
        <div className="layout">
          <header className="header">
            <div className="header-left">
              <div className="logo">
                <div className="logo-mark"></div>
                AIPPT
              </div>
              <div className="breadcrumb">
                <span>我的项目</span>
                <span className="breadcrumb-sep">/</span>
                <span className="breadcrumb-current">市场分析报告</span>
              </div>
            </div>
            <div className="header-right">
              <button className="btn">导出</button>
              <button className="btn btn-primary">保存</button>
            </div>
          </header>

          <div className="main">
            <aside className="panel-left">
              <div className="panel-section">
                <div className="panel-title">选择模板</div>
                <div className="template-list">
                  {templates.map((t, i) => (
                    <div key={i} className={`template-item ${selected === i ? 'selected' : ''}`} onClick={() => setSelected(i)}>
                      <div style={{ width: '100%', height: '100%', background: t.color, opacity: 0.8 }}></div>
                      <div className="template-item-label">{t.name}</div>
                      <div className="template-check">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3">
                          <path d="M20 6L9 17l-5-5"/>
                        </svg>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="panel-section">
                <div className="panel-title">风格分析</div>
                <div className="style-item">
                  <div className="style-label">主色调</div>
                  <div className="color-row">
                    {['#667eea', '#764ba2', '#f093fb', '#f5576c', '#1e3a5f'].map((c, i) => (
                      <div key={i} className="color-dot" style={{ background: c }}></div>
                    ))}
                  </div>
                </div>
                <div className="style-item">
                  <div className="style-label">字体</div>
                  <div className="style-value">思源黑体</div>
                </div>
                <div className="style-item">
                  <div className="style-label">布局</div>
                  <div className="style-value">单栏左对齐</div>
                </div>
              </div>
            </aside>

            <main className="preview-area">
              <div className="slide-preview">
                <div className="slide-title">市场分析报告</div>
                <div className="slide-content">
                  本报告深入分析了2024年度市场趋势。研究涵盖行业规模、竞争格局、增长机会三大维度。基于多方数据来源，我们发现市场整体呈现稳步增长态势...
                </div>
                <div className="slide-footer">
                  <div className="slide-meta">第 1 页 / 共 12 页</div>
                </div>
              </div>

              <div className="preview-controls">
                <button className="preview-nav">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M15 18l-6-6 6-6"/>
                  </svg>
                </button>
                <span className="preview-counter">1 / 12</span>
                <button className="preview-nav">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M9 18l6-6-6-6"/>
                  </svg>
                </button>
              </div>
            </main>

            <aside className="panel-right">
              <div className="panel-tabs">
                <button className="panel-tab active">大纲</button>
                <button className="panel-tab">内容</button>
              </div>
              <div className="panel-content">
                {slides.map((s, i) => (
                  <div key={i} className={`outline-item ${i === 0 ? 'active' : ''}`}>
                    <div className="outline-num">{i + 1}</div>
                    <div className="outline-text">
                      <div className="outline-title">{s.title}</div>
                      <div className="outline-sub">{s.sub}</div>
                    </div>
                  </div>
                ))}
              </div>
            </aside>
          </div>

          <footer className="bottom-bar">
            <button className="prompt-trigger" onClick={() => setPromptOpen(!promptOpen)}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
            </button>
            <div className="prompt-input-area">
              <input className="prompt-input" placeholder="描述你的需求，AI 将生成 PPT..." />
              <button className="prompt-send">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
              </button>
            </div>
          </footer>

          <div className={`prompt-float ${promptOpen ? 'open' : ''}`}>
            <div className="prompt-float-title">详细需求</div>
            <div className="prompt-field">
              <label className="prompt-label">主题</label>
              <textarea className="prompt-textarea" rows="2" placeholder="例如：毛绒玩具市场分析"></textarea>
            </div>
            <div className="prompt-field">
              <label className="prompt-label">关键要点</label>
              <textarea className="prompt-textarea" rows="3" placeholder="列出主要内容和要点..."></textarea>
            </div>
            <div className="prompt-actions">
              <button className="btn" onClick={() => setPromptOpen(false)}>取消</button>
              <button className="btn btn-primary">生成</button>
            </div>
          </div>
        </div>
      );
    }

    window.App = App;
  </script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
