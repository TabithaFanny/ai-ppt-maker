<!--
  AI PPT 工作台 C - 编辑器聚焦
  Style: Light mode, editor-centric, split view
  Target: Power users who want full control

  Layout:
  - Top: Minimal header
  - Left: Template picker (narrow)
  - Center Left: Outline/Structure
  - Center Right: Content Editor
  - Right: Preview (narrow)
  - Bottom: Prompt + Actions
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI PPT 工作台 - 编辑器聚焦</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: oklch(99% 0 0);
      --surface: oklch(97% 0 0);
      --surface-raised: oklch(100% 0 0);
      --border: oklch(90% 0 0);
      --text: oklch(15% 0.02 0);
      --text-secondary: oklch(45% 0.02 0);
      --text-muted: oklch(65% 0.02 0);
      --accent: oklch(55% 0.18 250);
      --accent-light: oklch(94% 0.03 250);
      --shadow: oklch(0% 0 0 / 0.08);
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-rows: 52px 1fr 72px;
      height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface-raised);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--surface-raised);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
    }

    /* Main */
    .main {
      display: grid;
      grid-template-columns: 200px 1fr 320px 280px;
      overflow: hidden;
    }

    /* Template Picker */
    .templates {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .template-thumb {
      aspect-ratio: 16/9;
      background: var(--surface-raised);
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .template-thumb.selected {
      border-color: var(--accent);
    }

    .template-thumb-inner {
      width: 100%;
      height: 100%;
      opacity: 0.8;
    }

    .template-thumb-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3px 6px;
      background: rgba(0,0,0,0.6);
      font-size: 9px;
      color: white;
    }

    /* Outline Panel */
    .outline {
      background: var(--surface-raised);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .outline-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .outline-title {
      font-size: 14px;
      font-weight: 600;
    }

    .outline-add {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
    }

    .outline-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .outline-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
    }

    .outline-item:hover {
      background: var(--surface);
    }

    .outline-item.active {
      background: var(--accent-light);
    }

    .outline-num {
      width: 24px;
      height: 24px;
      background: var(--surface);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .outline-item.active .outline-num {
      background: var(--accent);
      color: white;
    }

    .outline-info {
      flex: 1;
    }

    .outline-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .outline-type {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Editor Panel */
    .editor {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .editor-tabs {
      display: flex;
      gap: 4px;
    }

    .editor-tab {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .editor-tab.active {
      background: var(--surface);
      color: var(--text);
    }

    .editor-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .field-group {
      margin-bottom: 20px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .field-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .field-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .content-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .content-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .content-block-type {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .content-block-remove {
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }

    /* Preview Panel */
    .preview {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-title {
      font-size: 14px;
      font-weight: 600;
    }

    .preview-actions {
      display: flex;
      gap: 6px;
    }

    .preview-btn {
      padding: 6px 10px;
      font-size: 11px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }

    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .slide-card {
      width: 100%;
      aspect-ratio: 16/9;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px var(--shadow);
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .slide-card-title {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      margin-bottom: 12px;
    }

    .slide-card-text {
      font-size: 11px;
      color: #444;
      line-height: 1.6;
    }

    .preview-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .preview-nav {
      width: 32px;
      height: 32px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .preview-counter {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Bottom Bar */
    .bottom-bar {
      background: var(--surface-raised);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    .prompt-btn {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
    }

    .prompt-field {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
    }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      padding: 12px 0;
    }

    .prompt-submit {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      const [active, setActive] = React.useState(0);

      const templates = [
        { name: '商务蓝', color: '#1e3a5f' },
        { name: '创意渐变', color: '#667eea' },
        { name: '简约灰', color: '#6b7280' },
        { name: '自然绿', color: '#10b981' },
      ];

      const slides = [
        { name: '市场分析报告', type: '封面' },
        { name: '目录', type: '目录' },
        { name: '核心发现', type: '内容' },
        { name: '竞争格局', type: '内容' },
        { name: '战略建议', type: '结论' },
      ];

      return (
        <div className="layout">
          <header className="header">
            <div className="header-brand">
              <div className="logo">AIPPT</div>
            </div>
            <div className="header-actions">
              <button className="btn">历史版本</button>
              <button className="btn">导出</button>
              <button className="btn btn-primary">保存</button>
            </div>
          </header>

          <div className="main">
            <aside className="templates">
              <div className="section-title">模板</div>
              <div className="template-grid">
                {templates.map((t, i) => (
                  <div key={i} className={`template-thumb ${i === 0 ? 'selected' : ''}`}>
                    <div className="template-thumb-inner" style={{ background: t.color }}></div>
                    <div className="template-thumb-label">{t.name}</div>
                  </div>
                ))}
              </div>

              <div className="section-title" style={{ marginTop: 20 }}>风格</div>
              <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
                <div style={{ marginBottom: 8 }}>主色: #667eea</div>
                <div style={{ marginBottom: 8 }}>字体: 思源黑体</div>
                <div>布局: 单栏</div>
              </div>
            </aside>

            <aside className="outline">
              <div className="outline-header">
                <div className="outline-title">大纲 (5)</div>
                <button className="outline-add">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M12 5v14M5 12h14"/>
                  </svg>
                </button>
              </div>
              <div className="outline-list">
                {slides.map((s, i) => (
                  <div key={i} className={`outline-item ${i === 0 ? 'active' : ''}`} onClick={() => setActive(i)}>
                    <div className="outline-num">{i + 1}</div>
                    <div className="outline-info">
                      <div className="outline-name">{s.name}</div>
                      <div className="outline-type">{s.type}</div>
                    </div>
                  </div>
                ))}
              </div>
            </aside>

            <main className="editor">
              <div className="editor-header">
                <div className="editor-tabs">
                  <button className="editor-tab active">内容</button>
                  <button className="editor-tab">样式</button>
                  <button className="editor-tab">设置</button>
                </div>
              </div>
              <div className="editor-content">
                <div className="field-group">
                  <div className="field-label">页面标题</div>
                  <input className="field-input" defaultValue="市场分析报告" />
                </div>

                <div className="field-group">
                  <div className="field-label">核心结论</div>
                  <textarea className="field-input field-textarea" defaultValue="2024年市场增长率达23%，头部企业市场份额持续扩大"></textarea>
                </div>

                <div className="field-group">
                  <div className="field-label">内容块</div>
                  <div className="content-block">
                    <div className="content-block-header">
                      <span className="content-block-type">文字</span>
                      <button className="content-block-remove">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                          <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                      </button>
                    </div>
                    <textarea className="field-input" rows="3" defaultValue="本报告深入分析了2024年度市场趋势，涵盖行业规模、竞争格局、增长机会三大维度..."></textarea>
                  </div>
                  <button className="btn" style={{ width: '100%', marginTop: 8 }}>+ 添加内容块</button>
                </div>
              </div>
            </main>

            <aside className="preview">
              <div className="preview-header">
                <div className="preview-title">预览</div>
                <div className="preview-actions">
                  <button className="preview-btn">全屏</button>
                </div>
              </div>
              <div className="preview-content">
                <div className="slide-card">
                  <div className="slide-card-title">市场分析报告</div>
                  <div className="slide-card-text">
                    本报告深入分析了2024年度市场趋势。研究涵盖行业规模、竞争格局、增长机会三大维度。基于多方数据，我们发现市场呈现稳步增长态势...
                  </div>
                </div>
              </div>
              <div className="preview-footer">
                <button className="preview-nav">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M15 18l-6-6 6-6"/>
                  </svg>
                </button>
                <span className="preview-counter">1 / 5</span>
                <button className="preview-nav">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M9 18l6-6-6-6"/>
                  </svg>
                </button>
              </div>
            </aside>
          </div>

          <footer className="bottom-bar">
            <button className="prompt-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
            </button>
            <div className="prompt-field">
              <input className="prompt-input" placeholder="描述你的需求，AI 将生成内容..." />
              <button className="prompt-submit">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
              </button>
            </div>
          </footer>
        </div>
      );
    }

    window.App = App;
  </script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
