<!--
  AI PPT 工作台 - 工作台式布局
  Style: Dark mode, multi-panel workspace, bottom prompt bar
  Target: Professional PPT creation workflow

  Layout Structure:
  - Left Panel 1: Template Gallery (collapsible)
  - Left Panel 2: Style Analysis
  - Center: Main Editor (大纲 + 内容)
  - Right: Preview Panel
  - Bottom: Prompt Bar (collapsible)

  Design Decisions:
  - Dark mode (like Kimi PPT)
  - Fixed bottom prompt bar
  - Resizable panels
  - Grid-based template selection
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI PPT 工作台</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: oklch(12% 0 0);
      --bg-secondary: oklch(16% 0 0);
      --bg-tertiary: oklch(20% 0 0);
      --bg-elevated: oklch(24% 0.01 0);
      --border: oklch(30% 0 0);
      --text-primary: oklch(95% 0 0);
      --text-secondary: oklch(70% 0 0);
      --text-muted: oklch(50% 0 0);
      --accent: oklch(65% 0.18 250);
      --accent-glow: oklch(65% 0.25 250 / 0.3);
      --success: oklch(65% 0.15 155);
      --warning: oklch(70% 0.15 85);
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* Main Layout */
    .workspace {
      display: grid;
      grid-template-columns: 280px 320px 1fr 400px;
      grid-template-rows: 56px 1fr 80px;
      height: 100vh;
    }

    /* Top Bar */
    .topbar {
      grid-column: 1 / -1;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-tabs {
      display: flex;
      gap: 4px;
    }

    .topbar-tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .topbar-tab:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .topbar-tab.active {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .topbar-btn:hover {
      background: var(--bg-elevated);
    }

    .topbar-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .topbar-btn.primary:hover {
      filter: brightness(1.1);
    }

    /* Left Panel 1: Template Gallery */
    .panel-templates {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
    }

    .panel-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .template-card {
      aspect-ratio: 16/10;
      background: var(--bg-tertiary);
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }

    .template-card:hover {
      border-color: var(--border);
    }

    .template-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .template-card-preview {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-muted);
    }

    .template-card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      font-size: 10px;
      color: var(--text-secondary);
    }

    .template-card.selected .template-card-label {
      color: var(--accent);
    }

    .template-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .template-card.selected .template-check {
      display: flex;
    }

    /* Left Panel 2: Style Analysis */
    .panel-style {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }

    .style-section {
      margin-bottom: 24px;
    }

    .style-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .style-value {
      font-size: 14px;
      color: var(--text-primary);
    }

    .color-swatches {
      display: flex;
      gap: 8px;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .style-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .style-tag {
      padding: 4px 10px;
      font-size: 11px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border-radius: 12px;
    }

    /* Center: Main Editor */
    .panel-editor {
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-toolbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-title {
      font-size: 14px;
      font-weight: 600;
    }

    .editor-actions {
      display: flex;
      gap: 8px;
    }

    .editor-btn {
      padding: 6px 12px;
      font-size: 12px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .editor-btn:hover {
      color: var(--text-primary);
    }

    .editor-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .outline-tree {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .outline-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .outline-item:hover {
      background: var(--bg-tertiary);
    }

    .outline-item.active {
      background: var(--bg-tertiary);
      border-left: 2px solid var(--accent);
    }

    .outline-number {
      width: 24px;
      height: 24px;
      background: var(--bg-elevated);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .outline-item.active .outline-number {
      background: var(--accent);
      color: white;
    }

    .outline-info {
      flex: 1;
      min-width: 0;
    }

    .outline-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .outline-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Right: Preview */
    .panel-preview {
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-title {
      font-size: 13px;
      font-weight: 600;
    }

    .preview-actions {
      display: flex;
      gap: 8px;
    }

    .preview-btn {
      padding: 6px 10px;
      font-size: 11px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
    }

    .preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .preview-slide {
      width: 100%;
      aspect-ratio: 16/9;
      background: white;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      padding: 32px;
      display: flex;
      flex-direction: column;
    }

    .preview-slide-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .preview-slide-content {
      font-size: 14px;
      color: #333;
      line-height: 1.8;
    }

    .preview-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .preview-nav-btn {
      width: 32px;
      height: 32px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .preview-nav-btn:hover {
      color: var(--text-primary);
    }

    .preview-counter {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Bottom: Prompt Bar */
    .prompt-bar {
      grid-column: 1 / -1;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .prompt-toggle {
      width: 40px;
      height: 40px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .prompt-toggle:hover {
      color: var(--text-primary);
    }

    .prompt-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 16px;
    }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-primary);
      padding: 12px 0;
    }

    .prompt-input::placeholder {
      color: var(--text-muted);
    }

    .prompt-send {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
    }

    .prompt-send:hover {
      filter: brightness(1.1);
    }

    /* Expanded Prompt Panel */
    .prompt-panel {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: none;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.3);
    }

    .prompt-panel.open {
      display: block;
    }

    .prompt-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .prompt-panel-title {
      font-size: 14px;
      font-weight: 600;
    }

    .prompt-panel-close {
      width: 28px;
      height: 28px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .prompt-form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .prompt-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .prompt-field.full {
      grid-column: 1 / -1;
    }

    .prompt-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .prompt-textarea {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-primary);
      resize: vertical;
      min-height: 80px;
    }

    .prompt-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .prompt-points {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .prompt-point {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .prompt-point-remove {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
    }

    .prompt-submit {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    .prompt-submit-btn {
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }

    .prompt-submit-btn.secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .prompt-submit-btn.primary {
      background: var(--accent);
      color: white;
      border: none;
    }

    /* Responsive */
    @media (max-width: 1400px) {
      .workspace {
        grid-template-columns: 240px 280px 1fr 320px;
      }
    }

    @media (max-width: 1200px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .panel-templates,
      .panel-style {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [selectedTemplate, setSelectedTemplate] = useState(0);
      const [promptOpen, setPromptOpen] = useState(false);
      const [promptValue, setPromptValue] = useState('');

      const templates = [
        { name: '自由风格', colors: ['#667eea', '#764ba2'] },
        { name: '商务蓝调', colors: ['#1e3a5f', '#3b82f6'] },
        { name: '创意渐变', colors: ['#f093fb', '#f5576c'] },
        { name: '简约灰韵', colors: ['#374151', '#6b7280'] },
        { name: '自然绿洲', colors: ['#10b981', '#34d399'] },
        { name: '暖棕手札', colors: ['#d97706', '#fbbf24'] },
      ];

      const slides = [
        { title: '市场分析报告', subtitle: '2024年度行业趋势' },
        { title: '核心发现', subtitle: '市场增长率达23%' },
        { title: '竞争格局', subtitle: '头部企业市场份额' },
      ];

      return (
        <div className="workspace">
          {/* Top Bar */}
          <header className="topbar">
            <div className="topbar-left">
              <div className="logo">
                <div className="logo-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                  </svg>
                </div>
                AIPPT
              </div>
              <div className="topbar-tabs">
                <button className="topbar-tab active">模板</button>
                <button className="topbar-tab">AI 生成</button>
                <button className="topbar-tab">我的项目</button>
              </div>
            </div>
            <div className="topbar-right">
              <button className="topbar-btn">导出</button>
              <button className="topbar-btn primary">保存</button>
            </div>
          </header>

          {/* Left Panel 1: Template Gallery */}
          <aside className="panel-templates">
            <div className="panel-header">选择模板</div>
            <div className="template-grid">
              {templates.map((t, i) => (
                <div
                  key={i}
                  className={`template-card ${selectedTemplate === i ? 'selected' : ''}`}
                  onClick={() => setSelectedTemplate(i)}
                >
                  <div className="template-card-preview" style={{ background: `linear-gradient(135deg, ${t.colors[0]}, ${t.colors[1]})` }}>
                  </div>
                  <div className="template-card-label">{t.name}</div>
                  <div className="template-check">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3">
                      <path d="M20 6L9 17l-5-5"/>
                    </svg>
                  </div>
                </div>
              ))}
            </div>
          </aside>

          {/* Left Panel 2: Style Analysis */}
          <aside className="panel-style">
            <div className="panel-header">风格分析</div>

            <div className="style-section">
              <div className="style-label">主色调</div>
              <div className="color-swatches">
                {['#667eea', '#764ba2', '#f093fb', '#f5576c', '#1e3a5f'].map((c, i) => (
                  <div key={i} className="color-swatch" style={{ background: c }}></div>
                ))}
              </div>
            </div>

            <div className="style-section">
              <div className="style-label">风格标签</div>
              <div className="style-tags">
                {['简约', '商务', '科技感', '渐变', '现代'].map((tag, i) => (
                  <span key={i} className="style-tag">{tag}</span>
                ))}
              </div>
            </div>

            <div className="style-section">
              <div className="style-label">字体</div>
              <div className="style-value">思源黑体 / Arial</div>
            </div>

            <div className="style-section">
              <div className="style-label">布局</div>
              <div className="style-value">单栏 / 左图右文</div>
            </div>

            <div className="style-section">
              <div className="style-label">设计原则</div>
              <div className="style-tags">
                {['一页一结论', '视觉层级清晰', '留白充足', '对齐统一'].map((p, i) => (
                  <span key={i} className="style-tag">{p}</span>
                ))}
              </div>
            </div>
          </aside>

          {/* Center: Main Editor */}
          <main className="panel-editor">
            <div className="editor-toolbar">
              <div className="editor-title">大纲结构 ({slides.length} 页)</div>
              <div className="editor-actions">
                <button className="editor-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M12 5v14M5 12h14"/>
                  </svg>
                  添加页面
                </button>
                <button className="editor-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                  </svg>
                  预览
                </button>
              </div>
            </div>
            <div className="editor-content">
              <div className="outline-tree">
                {slides.map((slide, i) => (
                  <div key={i} className={`outline-item ${i === 0 ? 'active' : ''}`}>
                    <div className="outline-number">{i + 1}</div>
                    <div className="outline-info">
                      <div className="outline-title">{slide.title}</div>
                      <div className="outline-subtitle">{slide.subtitle}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </main>

          {/* Right: Preview */}
          <aside className="panel-preview">
            <div className="preview-header">
              <div className="preview-title">预览</div>
              <div className="preview-actions">
                <button className="preview-btn">全屏</button>
                <button className="preview-btn">编辑</button>
              </div>
            </div>
            <div className="preview-content">
              <div className="preview-slide">
                <div className="preview-slide-title">市场分析报告</div>
                <div className="preview-slide-content">
                  本报告深入分析了2024年度市场趋势，涵盖行业规模、竞争格局、增长机会等关键维度。基于数据研究，我们发现市场整体呈现稳步增长态势...
                </div>
              </div>
            </div>
            <div className="preview-footer">
              <button className="preview-nav-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M15 18l-6-6 6-6"/>
                </svg>
              </button>
              <span className="preview-counter">1 / 12</span>
              <button className="preview-nav-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M9 18l6-6-6-6"/>
                </svg>
              </button>
            </div>
          </aside>

          {/* Bottom: Prompt Bar */}
          <footer className="prompt-bar">
            <button className="prompt-toggle" onClick={() => setPromptOpen(!promptOpen)}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
            </button>
            <div className="prompt-input-wrap">
              <input
                className="prompt-input"
                placeholder="输入需求，AI 将自动生成 PPT..."
                value={promptValue}
                onChange={(e) => setPromptValue(e.target.value)}
              />
              <button className="prompt-send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
              </button>
            </div>
          </footer>

          {/* Expanded Prompt Panel */}
          <div className={`prompt-panel ${promptOpen ? 'open' : ''}`}>
            <div className="prompt-panel-header">
              <div className="prompt-panel-title">详细需求</div>
              <button className="prompt-panel-close" onClick={() => setPromptOpen(false)}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div className="prompt-form">
              <div className="prompt-field full">
                <label className="prompt-label">主题</label>
                <input className="prompt-textarea" placeholder="例如：毛绒玩具市场分析" style={{ minHeight: '40px', resize: 'none' }} />
              </div>
              <div className="prompt-field full">
                <label className="prompt-label">详细描述</label>
                <textarea className="prompt-textarea" placeholder="详细说明 PPT 的目的、受众和重点内容..."></textarea>
              </div>
              <div className="prompt-field">
                <label className="prompt-label">页数</label>
                <input className="prompt-textarea" placeholder="20" style={{ minHeight: '40px', resize: 'none' }} />
              </div>
              <div className="prompt-field">
                <label className="prompt-label">受众</label>
                <input className="prompt-textarea" placeholder="例如：企业决策者" style={{ minHeight: '40px', resize: 'none' }} />
              </div>
              <div className="prompt-field full">
                <label className="prompt-label">关键要点</label>
                <div className="prompt-points">
                  <span className="prompt-point">市场概况 <span className="prompt-point-remove">x</span></span>
                  <span className="prompt-point">竞争分析 <span className="prompt-point-remove">x</span></span>
                  <span className="prompt-point">SWOT分析 <span className="prompt-point-remove">x</span></span>
                  <span className="prompt-point">+ 添加</span>
                </div>
              </div>
              <div className="prompt-submit">
                <button className="prompt-submit-btn secondary">重置</button>
                <button className="prompt-submit-btn primary">生成 PPT</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    window.App = App;
  </script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
